services:
  app:
    build: .
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.powercv.rule=Host(`${DOMAIN:-powercv.localhost}`)"
      - "traefik.http.routers.powercv.entrypoints=web"
      - "traefik.http.services.powercv.loadbalancer.server.port=80"
